<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InstaIntrov — Mobile Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      padding: 24px;
    }
    h1 { font-size: 14px; font-weight: 600; opacity: 0.7; letter-spacing: 0.04em; text-transform: uppercase; }
    .phone {
      width: 393px;
      height: 852px;
      border-radius: 48px;
      border: 10px solid #2d2d44;
      background: #000;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), inset 0 0 0 2px #444;
      position: relative;
    }
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #000;
      border-radius: 0 0 18px 18px;
      z-index: 2;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0f0f0f;
    }
    p { font-size: 13px; opacity: 0.55; text-align: center; max-width: 420px; line-height: 1.5; }
    a { color: #a78bfa; }
  </style>
</head>
<body>
  <h1>InstaIntrov · iPhone 14 Pro</h1>
  <div class="phone">
    <div class="notch"></div>
    <iframe src="http://localhost:8083" title="InstaIntrov app"></iframe>
  </div>
  <p>
    Preview web di frame iPhone. Untuk HP asli: <a href="exp://192.168.0.112:8084">exp://192.168.0.112:8084</a>
    · Kode: <strong>1234</strong>
  </p>
</body>
</html>
